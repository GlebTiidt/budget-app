<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Budget Telegram Bot</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, ui-sans-serif, system-ui, sans-serif;
        background: #0b1020;
        color: #e5e7eb;
      }
      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
      }
      main {
        width: min(34rem, calc(100% - 3rem));
        padding: 2rem;
        border: 1px solid #26324d;
        border-radius: 1rem;
        background: #11182b;
      }
      h1 { margin-top: 0; }
      p { color: #aeb8cc; line-height: 1.6; }
      .status { color: #34d399; }
    </style>
  </head>
  <body>
    <main>
      <h1>Budget Telegram Bot</h1>
      <p class="status">Проект развёрнут.</p>
      <p>Telegram webhook, Notion и отчёты будут подключены по этапам проектного чек-листа.</p>
    </main>
  </body>
</html>
